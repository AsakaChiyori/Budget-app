<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>產生 App Icon</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 40px; background: #f5f5f5; }
  h2 { margin-bottom: 8px; }
  p  { color: #666; margin-bottom: 24px; }
  .row { display: flex; gap: 32px; flex-wrap: wrap; }
  .item { text-align: center; }
  canvas { display: block; border-radius: 22%; box-shadow: 0 4px 20px rgba(0,0,0,.2); margin-bottom: 12px; }
  a.dl {
    display: inline-block; padding: 10px 24px; background: #007AFF;
    color: #fff; border-radius: 10px; text-decoration: none; font-size: 15px;
  }
  a.dl:hover { background: #0056b3; }
  .note { margin-top: 32px; background: #fff; border-radius: 12px; padding: 20px; font-size: 14px; color: #444; line-height: 1.7; }
  .note strong { color: #007AFF; }
</style>
</head>
<body>
<h2>步驟一：產生 App Icon</h2>
<p>點擊下方按鈕下載兩個 icon 檔案，然後將它們放到與 <code>index.html</code> 相同的資料夾。</p>
<div class="row" id="output"></div>
<div class="note">
  <strong>下載後請確認：</strong><br>
  資料夾內應包含以下檔案：<br>
  📄 index.html<br>
  📄 manifest.json<br>
  📄 sw.js<br>
  🖼️ icon-192.png　← 剛下載<br>
  🖼️ icon-512.png　← 剛下載<br><br>
  完成後，繼續參考部署說明將整個資料夾上傳到 GitHub Pages 或 Netlify。
</div>

<script>
function drawIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width  = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const s = size;

  // 圓角背景（漸層藍）
  const r = s * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(s - r, 0);
  ctx.arcTo(s, 0, s, r, r); ctx.lineTo(s, s - r);
  ctx.arcTo(s, s, s - r, s, r); ctx.lineTo(r, s);
  ctx.arcTo(0, s, 0, s - r, r); ctx.lineTo(0, r);
  ctx.arcTo(0, 0, r, 0, r); ctx.closePath();

  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#007AFF');
  grad.addColorStop(1, '#5856D6');
  ctx.fillStyle = grad;
  ctx.fill();

  // 白色卡片圖示
  const cx = s * 0.5, cy = s * 0.5;
  const w = s * 0.58, h = s * 0.38, cr = s * 0.06;
  const x = cx - w / 2, y = cy - h / 2;

  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.moveTo(x + cr, y); ctx.lineTo(x + w - cr, y);
  ctx.arcTo(x + w, y, x + w, y + cr, cr);
  ctx.lineTo(x + w, y + h - cr);
  ctx.arcTo(x + w, y + h, x + w - cr, y + h, cr);
  ctx.lineTo(x + cr, y + h);
  ctx.arcTo(x, y + h, x, y + h - cr, cr);
  ctx.lineTo(x, y + cr);
  ctx.arcTo(x, y, x + cr, y, cr);
  ctx.closePath();
  ctx.fill();

  // 卡片上的色條
  ctx.fillStyle = 'rgba(0,122,255,0.85)';
  ctx.beginPath();
  ctx.moveTo(x + cr, y); ctx.lineTo(x + w - cr, y);
  ctx.arcTo(x + w, y, x + w, y + cr, cr);
  ctx.lineTo(x + w, y + h * 0.38);
  ctx.lineTo(x, y + h * 0.38); ctx.lineTo(x, y + cr);
  ctx.arcTo(x, y, x + cr, y, cr); ctx.closePath();
  ctx.fill();

  // 小點點（晶片感）
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  const dotY = y + h * 0.62;
  [x + w*0.18, x + w*0.34].forEach(dx => {
    ctx.beginPath();
    ctx.arc(dx, dotY, s * 0.03, 0, Math.PI * 2);
    ctx.fill();
  });

  return canvas;
}

window.onload = function () {
  const out = document.getElementById('output');
  [192, 512].forEach(size => {
    const canvas = drawIcon(size);
    canvas.style.width  = Math.min(size, 160) + 'px';
    canvas.style.height = Math.min(size, 160) + 'px';

    const a = document.createElement('a');
    a.className = 'dl';
    a.download = `icon-${size}.png`;
    a.href = canvas.toDataURL('image/png');
    a.textContent = `⬇ 下載 icon-${size}.png`;

    const div = document.createElement('div');
    div.className = 'item';
    div.appendChild(canvas);
    div.appendChild(a);
    out.appendChild(div);
  });
};
</script>
</body>
</html>
